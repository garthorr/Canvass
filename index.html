<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Canvass</title>
    <style>
      :root { color-scheme: light dark; }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at top, #3a506b, #0b132b 60%);
      }
      main {
        max-width: 42rem;
        margin: 1rem;
        padding: 2rem;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.88);
        color: #111;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
      }
      h1 { margin-top: 0; }
      code {
        background: #f4f4f4;
        border-radius: 6px;
        padding: 0.1rem 0.35rem;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Canvass container is running ✅</h1>
      <p>
        If you see this page, the container is serving a real entry page instead of a directory listing.
      </p>
      <p>
        The app is available at <code>http://localhost:8100</code>.
      </p>
      <p>
        Replace this <code>index.html</code> with your actual app files as needed.
      </p>
    </main>
  </body>
</html>
